<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 120" role="img" aria-label="Multitenancy for Rails">
  <title>Multitenancy · Rails</title>
  <!-- Glyph: three offset panels sharing a baseline — tenants stacked. -->
  <g stroke="currentColor" stroke-width="1.1" stroke-linecap="square" stroke-linejoin="miter" fill="none">
    <!-- back panel -->
    <rect x="22" y="30" width="74" height="54" opacity="0.35"/>
    <!-- middle panel -->
    <rect x="40" y="40" width="74" height="54" opacity="0.65"/>
    <!-- front panel -->
    <rect x="58" y="50" width="74" height="54"/>
  </g>
  <!-- Panel interior hints: a title bar on the front panel -->
  <g fill="currentColor">
    <rect x="58" y="50" width="74" height="6" opacity="0.85"/>
    <!-- Three window dots / tenants -->
    <circle cx="64" cy="53" r="1.1" fill="#f5f1ea" opacity="0.65"/>
    <circle cx="69" cy="53" r="1.1" fill="#f5f1ea" opacity="0.65"/>
    <circle cx="74" cy="53" r="1.1" fill="#f5f1ea" opacity="0.65"/>
  </g>
  <!-- Content lines inside the front panel, hinting at per-tenant views -->
  <g stroke="currentColor" stroke-width="0.8" stroke-linecap="round" opacity="0.55">
    <line x1="66" y1="66" x2="118" y2="66"/>
    <line x1="66" y1="73" x2="104" y2="73"/>
    <line x1="66" y1="80" x2="112" y2="80"/>
    <line x1="66" y1="87" x2="96" y2="87"/>
    <line x1="66" y1="94" x2="108" y2="94"/>
  </g>
  <!-- Accent triangle: pointer from back to front, the "fan-out" to tenants -->
  <g stroke="currentColor" stroke-width="0.6" opacity="0.5" fill="none">
    <path d="M22 30 L22 20 L132 20 L132 50"/>
    <circle cx="22" cy="20" r="1.4" fill="currentColor"/>
    <circle cx="132" cy="20" r="1.4" fill="currentColor"/>
  </g>
  <!-- Wordmark: "multi" set in Fraunces, "tenancy" italicised on the line below -->
  <text x="160" y="56" font-family="'Fraunces', Georgia, serif" font-size="26" font-weight="500" letter-spacing="-0.01em" fill="currentColor">multi</text>
  <text x="160" y="84" font-family="'Fraunces', Georgia, serif" font-size="26" font-style="italic" font-weight="500" letter-spacing="-0.01em" fill="currentColor">tenancy</text>
  <line x1="160" y1="64" x2="264" y2="64" stroke="currentColor" stroke-width="0.6" opacity="0.4"/>
  <!-- Eyebrow: "FOR · RAILS" in monospace, echoes site-maps.svg's small caps treatment -->
  <text x="160" y="102" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="8.5" letter-spacing="0.18em" fill="currentColor" opacity="0.6">FOR · RAILS</text>
</svg>
